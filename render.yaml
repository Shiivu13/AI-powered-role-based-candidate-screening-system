services:
  - type: web
    name: ai-interview-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "from fastembed import TextEmbedding; list(TextEmbedding('sentence-transformers/all-MiniLM-L6-v2', cache_dir='fastembed_cache').embed(['warm']))"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false   # set in the Render dashboard (secret)
      - key: FRONTEND_URL
        sync: false   # set to the Vercel URL after the frontend is deployed
